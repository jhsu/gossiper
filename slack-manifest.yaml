display_information:
  name: Gossiper
  description: Passive Slack listener that sends AI-generated private commentary.
  background_color: "#1f2937"
features:
  bot_user:
    display_name: Gossiper
    always_online: false
  slash_commands:
    - command: /gossip-channel
      url: https://gossiper.company/slack/commands
      description: Whitelist the current channel for gossip
      usage_hint: "[off]"
      should_escape: false
    - command: /gossip-me
      url: https://gossiper.company/slack/commands
      description: Opt yourself in to receive gossip
      usage_hint: "[off]"
      should_escape: false
oauth_config:
  redirect_urls:
    - https://gossiper.company/api/slack/oauth/callback
  scopes:
    bot:
      - channels:history
      - groups:history
      - chat:write
      - commands
settings:
  event_subscriptions:
    request_url: https://gossiper.company/slack/events
    bot_events:
      - message.channels
      - message.groups
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
